                #filter-box select:focus { border-color: #2a8f85; }

                /* Crisp truck pins (replace emoji SVG icons) */
                .hsap-pin {
                    width: 34px; height: 34px; border-radius: 50%;
                    display: flex; align-items: center; justify-content: center;
                    box-shadow: 0 2px 6px rgba(0,0,0,.45), 0 0 0 2px rgba(255,255,255,.9);
                    transition: transform .15s ease, box-shadow .15s ease;
                    cursor: pointer;
                }
                .hsap-pin:hover {
                    transform: scale(1.18);
                    box-shadow: 0 4px 10px rgba(0,0,0,.55), 0 0 0 2px #fff;
                }
                .hsap-pin svg { width: 20px; height: 20px; display: block; }
                .hsap-pin.high    { background: #c44040; }
                .hsap-pin.medium  { background: #c49a2a; }
                .hsap-pin.low     { background: #3a9e6e; }
                .hsap-pin.weather { background: #2a8f85; }

                /* Subtle tile harmonisation with the dark dashboard chrome */
                .leaflet-tile-pane { filter: saturate(.9) contrast(.97); }

                .leaflet-popup-content-wrapper, .leaflet-tooltip {
                    border-radius: 8px;

            popupAnchor:[0, -16]
        });

        var marker = L.marker([item.lat, item.lon], {icon: icon})
            .bindPopup(item.popup)
            .bindTooltip(item.tooltip, {sticky: true});

        marker.customDate = item.date;
        marker.customTime = item.time;
        leafletMarkers.push(marker);
    });

    var uniqueDates = [...new Set(markerData.map(x => x.date))].sort();
    uniqueDates.forEach(function(d) {
        var opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        dateSelect.appendChild(opt);
    });

    function populateTimeDropdown(selectedDate) {
        timeSelect.innerHTML = '<option value="ALL">All Times</option>';

        var filtered = markerData.filter(function(x) {
            return selectedDate === "ALL" || x.date === selectedDate;
        });

        var uniqueTimes = [...new Set(filtered.map(x => x.time))].sort();
        uniqueTimes.forEach(function(t) {
            var opt = document.createElement("option");
            opt.value = t;
            opt.textContent = t;
            timeSelect.appendChild(opt);
        });
    }

    function updateMarkers() {
        var selectedDate = dateSelect.value;
        var selectedTime = timeSelect.value;

        markerLayer.clearLayers();

        var matchingMarkers = [];
        leafletMarkers.forEach(function(marker) {
            var dateMatch = (selectedDate === "ALL" || marker.customDate === selectedDate);
            var timeMatch = (selectedTime === "ALL" || marker.customTime === selectedTime);

            if (dateMatch && timeMatch) {
                markerLayer.addLayer(marker);
                matchingMarkers.push(marker);
            }
        });

        if (matchingMarkers.length > 0) {
            var group = L.featureGroup(matchingMarkers);
            mapObj.fitBounds(group.getBounds().pad(0.2));
        }
    }

    populateTimeDropdown("ALL");
    updateMarkers();

    dateSelect.addEventListener("change", function() {
        populateTimeDropdown(this.value);
        timeSelect.value = "ALL";
        updateMarkers();
    });

    timeSelect.addEventListener("change", function() {
        updateMarkers();
    });
}

setTimeout(initFilterMap, 300);
</script>
